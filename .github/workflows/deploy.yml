name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set build metadata
        run: |
          echo "VITE_GIT_COMMIT_SHA=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          APP_VERSION=$(node -p "require('./package.json').version || '0.1.0'")
          echo "VITE_APP_VERSION=${APP_VERSION}" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://lapnjolikwudodljrmqd.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_VLsID2RCsnkWRosG1-m-pg_egJDb61x
          VITE_GIT_COMMIT_SHA: ${{ env.VITE_GIT_COMMIT_SHA }}
          VITE_BUILD_TIME: ${{ env.VITE_BUILD_TIME }}
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
